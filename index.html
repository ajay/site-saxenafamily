<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saxena Family</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-bg: #faf8f4;
        --color-primary: #5c3d2e;
        --color-primary-dark: #3a2418;
        --color-accent: #b8860b;
        --color-text-muted: #7a7068;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--color-bg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        gap: 3rem;
      }

      h1 {
        font-family: "Playfair Display", serif;
        font-size: clamp(2rem, 5vw, 3.5rem);
        color: var(--color-primary);
        text-align: center;
      }

      .memorial-links {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        width: 100%;
        max-width: 460px;
      }

      .memorial-link {
        display: flex;
        align-items: center;
        gap: 1.25rem;
        padding: 1.25rem 1.5rem;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        text-decoration: none;
        color: var(--color-primary-dark);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .memorial-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      }

      .memorial-link img.avatar {
        width: 64px;
        height: 64px;
        border-radius: 8px;
        object-fit: cover;
        flex-shrink: 0;
      }

      .memorial-link .info {
        flex: 1;
      }

      .memorial-link h2 {
        font-family: "Playfair Display", serif;
        font-size: 1.2rem;
        font-weight: 600;
        margin-bottom: 0.3rem;
      }

      .memorial-link p {
        font-size: 0.85rem;
        color: var(--color-text-muted);
      }

      .memorial-link .qr-thumb {
        width: 48px;
        height: 48px;
        border-radius: 6px;
        flex-shrink: 0;
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .memorial-link .qr-thumb:hover {
        transform: scale(1.1);
      }

      .qr-site {
        cursor: pointer;
        transition: transform 0.2s ease;
      }

      .qr-site:hover {
        transform: scale(1.05);
      }

      .qr-site img {
        width: 100px;
        height: 100px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      /* Lightbox */
      .lightbox {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0, 0, 0, 0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.3s ease,
          visibility 0.3s ease;
        cursor: pointer;
      }

      .lightbox.open {
        opacity: 1;
        visibility: visible;
      }

      .lightbox img {
        max-width: 90vw;
        max-height: 90vh;
        border-radius: 8px;
      }

      .lightbox-close {
        position: absolute;
        top: 1rem;
        right: 1.5rem;
        background: none;
        border: none;
        color: #fff;
        font-size: 2rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Saxena Family</h1>
    <div class="memorial-links">
      <a href="gopal-krishna-saxena/" class="memorial-link">
        <img
          class="avatar"
          src="media/gopal-krishna-saxena.png"
          alt="Gopal Krishna Saxena"
        />
        <div class="info">
          <h2>Gopal Krishna Saxena</h2>
          <p>February 22, 1934 &mdash; April 4, 2026</p>
        </div>
        <img
          class="qr-thumb"
          src="media/qr-codes/qr-code_saxenafamily.com-gopal-krishna-saxena.png"
          alt="QR code for Gopal Krishna Saxena memorial"
          onclick="event.preventDefault(); openLightbox(this.src)"
        />
      </a>
    </div>
    <div class="qr-site" onclick="openLightbox('media/qr-codes/qr-code_saxenafamily.com.png')">
      <img
        src="media/qr-codes/qr-code_saxenafamily.com.png"
        alt="QR code for saxenafamily.com"
      />
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
      <button class="lightbox-close" aria-label="Close">&times;</button>
      <img id="lightbox-img" src="data:," alt="" />
    </div>

    <script>
      function openLightbox(src) {
        document.getElementById("lightbox-img").src = src;
        document.getElementById("lightbox").classList.add("open");
        document.body.style.overflow = "hidden";
      }
      function closeLightbox() {
        document.getElementById("lightbox").classList.remove("open");
        document.body.style.overflow = "";
      }
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeLightbox();
      });
    </script>
  </body>
</html>
