<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saxena Family</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #faf8f4;
      --color-primary: #5c3d2e;
      --color-primary-dark: #3a2418;
      --color-accent: #b8860b;
      --color-text-muted: #7a7068;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: var(--color-primary);
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .memorial-links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .memorial-link {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 1.25rem 1.5rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-decoration: none;
      color: var(--color-primary-dark);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .memorial-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .memorial-link img {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .memorial-link h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .memorial-link p {
      font-size: 0.85rem;
      color: var(--color-text-muted);
    }
  </style>
</head>
<body>
  <h1>Saxena Family</h1>
  <div class="memorial-links">
    <a href="gopal-krishna-saxena/" class="memorial-link">
      <img src="media/gopal-krishna-saxena.png" alt="Gopal Krishna Saxena">
      <div>
        <h2>Gopal Krishna Saxena</h2>
        <p>February 22, 1934 &mdash; April 4, 2026</p>
      </div>
    </a>
  </div>
</body>
</html>
